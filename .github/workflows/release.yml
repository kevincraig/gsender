name: Release

# Manually trigger a versioned release.
# This workflow bumps the version, commits + tags, then triggers the build workflow.
#
# Usage via GitHub UI: Actions → Release → Run workflow → choose bump type
# Usage via CLI: gh workflow run release.yml -f bump=patch

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump version and tag
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          # Bump both the root package.json and src/package.json in sync
          NEW_VERSION=$(npm version ${{ inputs.bump }} --no-git-tag-version | sed 's/^v//')
          cd src
          npm version "$NEW_VERSION" --no-git-tag-version
          cd ..
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped to $NEW_VERSION"

      - name: Commit and tag
        run: |
          git add package.json src/package.json
          git commit -m "chore: release v${{ steps.bump.outputs.new_version }}"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin master "v${{ steps.bump.outputs.new_version }}"

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.new_version }}"
          name: "gSender v${{ steps.bump.outputs.new_version }}"
          draft: true
          prerelease: false
          generate_release_notes: true
          body: |
            ## gSender v${{ steps.bump.outputs.new_version }}

            > Release artifacts are being built and will be attached shortly.
            > Publish this draft once all platform builds have uploaded their assets.
